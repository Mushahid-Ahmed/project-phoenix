version: "3.9"

services:
  api:
    build: .
    container_name: phoenix-api

    ports:
      - "8080:5000"

    environment:
      DATABASE_URI: mongodb://database:27017/phoenix

    depends_on:
      - database

  database:
    image: mongo:latest
    container_name: phoenix-db

    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: